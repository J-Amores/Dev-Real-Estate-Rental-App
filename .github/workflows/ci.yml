name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck + Build (Astro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Astro 5 pinned for Node 20.x (Astro 6 needs >= 22.12) — keep in sync with local env.
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (astro check)
        run: npx astro check

      - name: Build (astro build)
        run: npm run build

      - name: Verify required routes in build output
        run: |
          set -e
          test -f dist/index.html
          test -f dist/properties/index.html
          ls dist/properties/*/index.html >/dev/null
          echo "Routes OK: /, /properties, /properties/[id]"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
